<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Idol House Ranker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0b1f3a, #123a63, #2a6fa1);
  color: white;
}

.header {
  text-align: center;
  padding: 30px;
}

.logo {
  width: 120px;
}

.lineup-buttons {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 15px 0;
}

.lineup-buttons button {
  background: rgba(255,255,255,0.2);
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.lineup-buttons button.active {
  background: #4db8ff;
  color: #06253f;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 20px;
  padding: 20px;
}

.panel {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 15px;
}

.top-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.slot {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.07);
  padding: 10px;
  border-radius: 15px;
  text-align: center;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
}

button.action {
  margin-top: 10px;
  padding: 8px;
  border: none;
  border-radius: 10px;
  background: #2196f3;
  color: white;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h1>Idol House Ranker</h1>

  <div class="lineup-buttons" id="lineupButtons"></div>
</div>

<div class="container">

<div class="panel">
  <h2 id="title">Top 5</h2>
  <div id="topList" class="top-list"></div>

  <button class="action" onclick="resetRanking()">Sıfırla</button>
  <button class="action" onclick="removeLast()">Son seçimi kaldır</button>
</div>

<div class="panel">
  <h2>Stajyerler</h2>
  <div id="grid" class="grid"></div>
</div>

</div>

<script>

let maxRank = 5;

const trainees = [
{name:"Görkem", img:"gorkem.jpg"},
{name:"Kemal", img:"kemal.jpg"},
{name:"Ayberk", img:"ayberk.jpg"},
{name:"Civan", img:"civan.jpg"},
{name:"Arda Aykut", img:"ardaaykut.jpg"},
{name:"Miraç", img:"mirac.jpg"},
{name:"Umut", img:"umut.jpg"},
{name:"Ege", img:"ege.jpg"},
{name:"Bertuğ", img:"bertug.jpg"},
{name:"Oğuzhan", img:"oguzhan.jpg"},
{name:"Beytullah", img:"beytullah.jpg"},
{name:"Alperen", img:"alperen.jpg"},
{name:"Arda", img:"arda.jpg"},
{name:"Yusif", img:"yusif.jpg"},
{name:"Barış", img:"baris.jpg"},
{name:"Milan", img:"milan.jpg"},
{name:"Efe", img:"efe.jpg"},
{name:"Ahmet Emre", img:"ahmetemre.jpg"},
{name:"Batu", img:"batu.jpg"},
{name:"Akın", img:"akin.jpg"}
];

let ranking = [];

function renderButtons() {
  const container = document.getElementById("lineupButtons");
  container.innerHTML = "";

  for (let i = 5; i <= 9; i++) {
    const btn = document.createElement("button");
    btn.textContent = i;

    if (i === maxRank) btn.classList.add("active");

    btn.onclick = () => {
      maxRank = i;
      if (ranking.length > maxRank) {
        ranking = ranking.slice(0, maxRank);
      }
      renderAll();
    };

    container.appendChild(btn);
  }
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  trainees.forEach(t => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${t.img}">
      <p>${t.name}</p>
    `;

    div.onclick = () => select(t);
    grid.appendChild(div);
  });
}

function select(t) {
  if (ranking.length >= maxRank) return;
  if (ranking.find(x => x.name === t.name)) return;

  ranking.push(t);
  updateTop();
}

function updateTop() {
  const list = document.getElementById("topList");
  list.innerHTML = "";

  document.getElementById("title").textContent = `Top ${maxRank}`;

  ranking.forEach((t, i) => {
    const div = document.createElement("div");
    div.className = "slot";
    div.innerHTML = `${i+1}. ${t.name}`;
    list.appendChild(div);
  });
}

function resetRanking() {
  ranking = [];
  updateTop();
}

function removeLast() {
  ranking.pop();
  updateTop();
}

function renderAll() {
  renderButtons();
  renderGrid();
  updateTop();
}

renderAll();

</script>

</body>
</html>
